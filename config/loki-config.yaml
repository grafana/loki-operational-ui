auth_enabled: true

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  grpc_server_max_recv_msg_size: 8194304
  grpc_server_max_send_msg_size: 8194304
common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki/workingdir
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
dataobj:
    storage_bucket_prefix: dataobj
    index:
      events_per_index: 8
storage_config:
  use_thanos_objstore: true
  object_store:
    filesystem:
      dir: /tmp/loki/storage

frontend:
  max_outstanding_per_tenant: 2048
  encoding: protobuf
pattern_ingester:
  enabled: true
  metric_aggregation:
    loki_address: 127.0.0.1:3100
limits_config:
  allow_structured_metadata: true
  ingestion_burst_size_mb: 50000
  ingestion_rate_mb: 50000
  max_global_streams_per_user: 0
  query_timeout: 1h
  split_queries_by_interval: 1h
  tsdb_max_bytes_per_shard: 128MB
  tsdb_max_query_parallelism: 1
  tsdb_sharding_strategy: power_of_two
  volume_enabled: true

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        path_prefix: index/
        prefix: index_
        period: 24h

ui:
  enabled: true
  goldfish:
    enable: true
    cloudsql_user: admin
    cloudsql_host: docker.host.internal
    cloudsql_port: 3306 
    cloudsql_database: loki-goldfish-dev-database
    grafana_url: http://localhost:3000
    traces_datasource_uid: traces
    logs_datasource_uid: logs
    cell_a_namespace: loki-001
    cell_b_namespace: loki-002


ruler:
  alertmanager_url: http://localhost:9093
# By default, Loki will send anonymous, but uniquely-identifiable usage and configuration
# analytics to Grafana Labs. These statistics are sent to https://stats.grafana.org/
#
# Statistics help us better understand how Loki is used, and they show us performance
# levels for most users. This helps us prioritize features and documentation.
# For more information on what's sent, look at
# https://github.com/grafana/loki/blob/main/pkg/analytics/stats.go
# Refer to the buildReport method to see what goes into a report.
#
# If you would like to disable reporting, uncomment the following lines:
#analytics:
#  reporting_enabled: false
